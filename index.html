<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrestler Ranker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--font:'Atkinson Hyperlegible',sans-serif;--r:5px;--t:130ms ease}
:root,[data-theme="light"]{--bg:#f4f4f5;--sur:#fff;--sur2:#ebebec;--bdr:#d4d4d8;--bdr2:#a1a1aa;--tx:#18181b;--tx2:#52525b;--tx3:#a1a1aa;--acc:#1d4ed8;--acc2:#1e40af;--accl:#eff6ff;--acct:#fff;--red:#dc2626;--fb:#fafafa}
[data-theme="dark"]{--bg:#0f0f10;--sur:#18181b;--sur2:#27272a;--bdr:#3f3f46;--bdr2:#71717a;--tx:#fafafa;--tx2:#a1a1aa;--tx3:#52525b;--acc:#60a5fa;--acc2:#93c5fd;--accl:#172554;--acct:#0f172a;--red:#f87171;--fb:#111113}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:15px;line-height:1.5}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:44px;border-bottom:1px solid var(--bdr);background:var(--sur);flex-shrink:0}
.logo{font-weight:700;font-size:15px;color:var(--tx)}
.spacer{flex:1}
.tabs{display:flex;gap:2px}
.tab{font-family:var(--font);font-size:13px;padding:4px 10px;border-radius:var(--r);border:1px solid transparent;background:transparent;color:var(--tx2);cursor:pointer;transition:all var(--t)}
.tab:hover{background:var(--sur2);color:var(--tx)}
.tab.on{background:var(--sur2);color:var(--tx);border-color:var(--bdr)}
.theme{font-family:var(--font);font-size:12px;padding:4px 10px;border-radius:var(--r);border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;margin-left:6px;transition:all var(--t)}
.theme:hover{color:var(--tx)}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}

/* STATUS */
.status{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--tx2);font-size:14px}
.status.err{color:var(--red)}
.begin-btn{font-family:var(--font);font-size:15px;font-weight:700;padding:10px 32px;border-radius:var(--r);border:none;background:var(--acc);color:var(--acct);cursor:pointer;transition:background var(--t)}
.begin-btn:hover{background:var(--acc2)}

/* PICKER */
.picker{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 14px;gap:8px}

/* STATS */
.stats{display:flex;align-items:center;gap:16px;flex-shrink:0}
.stat{display:flex;flex-direction:column;gap:1px}
.sv{font-size:20px;font-weight:700;line-height:1;color:var(--acc);font-variant-numeric:tabular-nums}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.prog-wrap{flex:1}
.prog-bar{height:3px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .35s ease}
.prog-lbl{font-size:11px;color:var(--tx3);font-variant-numeric:tabular-nums}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.ctrl-lbl{font-size:12px;color:var(--tx3);white-space:nowrap}
.bslider{flex:1;max-width:120px;accent-color:var(--acc);cursor:pointer}
.bval{font-size:13px;font-weight:700;color:var(--acc);min-width:20px;font-variant-numeric:tabular-nums}
.btn{font-family:var(--font);font-size:12px;padding:4px 10px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all var(--t);white-space:nowrap;position:relative}
.btn:hover:not(:disabled){border-color:var(--bdr2);color:var(--tx);background:var(--sur2)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.red:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.btn[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--tx);color:var(--sur);font-size:11px;padding:4px 8px;border-radius:var(--r);white-space:nowrap;pointer-events:none;z-index:10;max-width:220px;white-space:normal;text-align:center}

/* GRID WRAPPER — fixed width so buttons never shift */
.grid-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;max-width:924px;margin:0 auto}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(5,minmax(0,180px));gap:6px;overflow-y:auto;max-height:338px;align-content:start;justify-content:center;width:100%}
.card{border:1px solid var(--bdr);border-radius:var(--r);padding:10px;cursor:pointer;transition:border-color var(--t),background var(--t);background:var(--sur);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;user-select:none;height:80px;overflow:hidden;text-align:center}
.card:hover{border-color:var(--bdr2)}
.card.sel{border-color:var(--acc);background:var(--accl)}
.cn{font-size:14px;font-weight:700;line-height:1.2;color:var(--tx)}
.card.sel .cn{color:var(--acc)}
.cl{font-size:11px;color:var(--tx3);text-decoration:none;margin-top:auto}
.cl:hover{color:var(--acc)}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;width:100%;justify-content:center}
.bottom-bar .spacer{flex:1}
.sel-ct{font-size:12px;color:var(--tx3);font-variant-numeric:tabular-nums;white-space:nowrap}
.conf-btn{font-family:var(--font);font-size:14px;font-weight:700;padding:8px 20px;border-radius:var(--r);border:none;background:var(--acc);color:var(--acct);cursor:pointer;transition:background var(--t)}
.conf-btn:hover{background:var(--acc2)}
.conf-btn:disabled{opacity:.3;cursor:not-allowed}

/* EXPLAINER */
.explainer{font-size:12px;color:var(--tx3);text-align:center;padding:6px 0 2px;flex-shrink:0}

/* FOOTER TEXT — always at bottom of picker col */
.footer-txt{font-size:11px;color:var(--tx3);flex-shrink:0;padding:6px 0 2px;text-align:center}
.footer-txt a{color:var(--tx3);text-decoration:underline}
.footer-txt a:hover{color:var(--acc)}

/* FOUND / RANKING */
.found-col{width:390px;border-left:1px solid var(--bdr);background:var(--fb);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.found-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 10px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0}

/* DRAWER BACKDROP */
.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
.drawer-backdrop.on{display:block}

/* RANKINGS BTN (mobile topbar) */
.rankings-btn{display:none;font-family:var(--font);font-size:12px;padding:4px 10px;border-radius:var(--r);border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all var(--t)}
.rankings-btn:hover{color:var(--tx)}

/* MOBILE */
@media(max-width:640px){
  body{font-size:14px}
  .rankings-btn{display:block}
  .found-col{position:fixed;bottom:0;left:0;right:0;width:100%;height:72vh;border-left:none;border-top:1px solid var(--bdr);border-radius:8px 8px 0 0;transform:translateY(100%);transition:transform .3s ease;z-index:50}
  .found-col.open{transform:translateY(0)}
  .grid{grid-template-columns:repeat(3,minmax(0,1fr));max-height:calc(100svh - 280px)}
  .grid-wrap{width:100%}
  .bottom-bar{max-width:100%;padding:4px 0}
  .btn{font-size:13px;padding:7px 10px}
  .conf-btn{font-size:15px;padding:10px 18px}
  .controls{gap:4px}
  .bslider{max-width:90px}
  .session-ui{overflow-y:auto}
}
.found-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3)}
.exp-btn{font-family:var(--font);font-size:11px;padding:3px 8px;border-radius:var(--r);border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all var(--t)}
.exp-btn:hover{border-color:var(--acc);color:var(--acc)}
.found-list{overflow-y:auto;flex:1;padding:4px;display:flex;flex-direction:column;gap:1px}
.fi{display:flex;align-items:center;gap:6px;padding:6px 7px;border-radius:var(--r);border:1px solid transparent;cursor:grab;user-select:none;transition:background var(--t),border-color var(--t)}
.fi:hover{background:var(--sur2)}
.fi.dragging{opacity:.3}
.fi.dover{border-color:var(--acc);background:var(--accl)}
.dh{font-size:11px;color:var(--tx3);flex-shrink:0}
.fr{font-size:14px;font-weight:700;color:var(--tx3);min-width:24px;font-variant-numeric:tabular-nums}
.fr.top{color:var(--acc)}
.fn{font-size:14px;color:var(--tx);flex:1;line-height:1.2}
.flink{color:var(--tx3);text-decoration:none;font-size:12px;flex-shrink:0}
.flink:hover{color:var(--acc)}
.found-empty{font-size:12px;color:var(--tx3);padding:10px 8px;line-height:1.6}

/* OPTIONS */
.opts{flex:1;overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:14px}
.opts.on{display:flex}
.fs{display:flex;flex-direction:column;gap:6px}
.ft{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3)}
.fsub{font-size:11px;color:var(--tx3);margin-top:-2px}
.frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chips{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.chip{font-family:var(--font);font-size:12px;padding:3px 9px;border-radius:20px;border:1px solid var(--bdr);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all var(--t)}
.chip:hover{border-color:var(--bdr2);color:var(--tx)}
.chip.on{background:var(--acc);border-color:var(--acc);color:var(--acct)}
.sel-all{font-family:var(--font);font-size:11px;padding:3px 8px;border-radius:var(--r);border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all var(--t);flex-shrink:0}
.sel-all:hover{border-color:var(--bdr2);color:var(--tx)}
.opts-btns{display:flex;gap:6px;flex-wrap:wrap}
.obtn{font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all var(--t)}
.obtn:hover{border-color:var(--bdr2);color:var(--tx)}
.obtn.pri{background:var(--acc);border-color:var(--acc);color:var(--acct);font-weight:700}
.obtn.pri:hover{background:var(--acc2)}
.pool-ct{font-size:12px;color:var(--tx2)}
.pool-ct strong{color:var(--tx)}
.fexp{font-size:11px;color:var(--tx3);line-height:1.5;margin-bottom:2px}
.credits{font-size:11px;color:var(--tx3);line-height:1.6;margin-top:4px}
.credits a{color:var(--tx3);text-decoration:underline}
.credits a:hover{color:var(--acc)}
.promo-group{display:flex;flex-direction:column;gap:6px;}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.moverlay.on{display:flex}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;max-width:300px;width:90%;display:flex;flex-direction:column;gap:10px}
.modal h3{font-size:15px;font-weight:700}
.modal p{font-size:13px;color:var(--tx2);line-height:1.6}
.mbtns{display:flex;gap:6px;justify-content:flex-end;margin-top:2px}
.mcancel{font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer}
.mcancel:hover{color:var(--tx)}
.mconfirm{font-family:var(--font);font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r);border:none;background:var(--red);color:#fff;cursor:pointer}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">Wrestler Ranker</span>
  <div class="spacer"></div>
  <div class="tabs">
    <button class="tab on" id="tab-picker" onclick="showTab('picker')">Picker</button>
    <button class="tab" id="tab-opts" onclick="showTab('options')">Options</button>
  </div>
  <button class="rankings-btn" id="rankings-btn" onclick="openDrawer()">Rankings</button>
  <button class="theme" id="theme-btn" onclick="toggleTheme()">Dark</button>
</div>

<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

<div class="main" id="main">
  <div class="status" id="loading">Loading wrestlers…</div>
</div>

<div class="moverlay" id="moverlay">
  <div class="modal">
    <h3>Reset session?</h3>
    <p>Your current progress will be lost and the session will restart with the current filtered pool.</p>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal()">Cancel</button>
      <button class="mconfirm" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<div class="moverlay" id="export-modal" onclick="if(event.target===this)closeExportModal()">
  <div class="modal" style="max-width:460px;width:95%">
    <h3>Export Ranking</h3>
    <div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">
      <button class="exp-tab-btn chip on" data-tab="text" onclick="showExportTab('text')">Plain Text</button>
      <button class="exp-tab-btn chip" data-tab="csv" onclick="showExportTab('csv')">CSV</button>
      <button class="exp-tab-btn chip" data-tab="url" onclick="showExportTab('url')">Shareable URL</button>
    </div>
    <textarea id="exp-ta" readonly style="font-family:monospace;font-size:12px;width:100%;height:180px;resize:vertical;border:1px solid var(--bdr);border-radius:var(--r);background:var(--sur2);color:var(--tx);padding:8px;line-height:1.5"></textarea>
    <div class="mbtns" style="margin-top:8px">
      <button class="mcancel" onclick="closeExportModal()">Close</button>
      <button class="obtn" id="exp-dl-btn" onclick="exportDownload()">Download</button>
      <button class="obtn pri" id="exp-copy-btn" onclick="exportCopy()">Copy</button>
    </div>
  </div>
</div>

<script>
/* ── THEME ─────────────────────────────────────────────────────────────── */
var prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
var currentTheme = localStorage.getItem('wr_theme') || (prefersDark.matches ? 'dark' : 'light');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? 'Light' : 'Dark';
  currentTheme = t;
  localStorage.setItem('wr_theme', t);
}
function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
applyTheme(currentTheme);

/* ── COTD PICKER ALGORITHM (picker.js by antialiasis, MIT license) ─────── */

PickerState.prototype.removeFromEliminated=function(item){var i,idx,eliminated=this.arrays.eliminated;for(i=eliminated.length-1;i>=0;i--){idx=this.findByIdentifier(item,eliminated[i].eliminatedBy);if(idx!==-1)this.removeEliminatedBy(i,idx);}};

/* ── APP STATE ──────────────────────────────────────────────────────────── */
var allWrestlers = [];
var filters = {gender:[],status:[],era:[],promoIndividual:[],promoGroups:[]};
var pickerInstance = null;
var manualOrder = null;
var dragSrcIdx = null;

/* ── LOAD ───────────────────────────────────────────────────────────────── */
async function loadWrestlers() {
  try {
    var r = await fetch('wrestlers.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allWrestlers = await r.json();
    onLoaded();
  } catch(e) {
    var el = document.getElementById('loading');
    if (el) { el.className = 'status err'; el.textContent = 'Failed to load data: ' + e.message; }
    else { document.getElementById('main').innerHTML = '<div class="status err">Error: ' + e.message + '</div>'; }
  }
}

function onLoaded() {
  setDefaultFilters();
  buildUI();
  beginSession();
  // Apply shared URL ranking after session is live (needs pickerInstance for renderFound)
  var sharedIds = loadFromHash();
  if (sharedIds) {
    applySharedRanking(sharedIds);
    renderFound();
  }
}

/* ── FILTERS ────────────────────────────────────────────────────────────── */
function getVals(field) {
  return [...new Set(allWrestlers.flatMap(function(w){return w[field]||[];}))].sort();
}

function setDefaultFilters() {
  filters.gender = ['man','woman'];
  filters.status = ['active','inactive'];
  filters.era = getVals('era');
  filters.promoIndividual = getVals('promotion_labels');
  filters.promoGroups = getVals('promotion_groups');
}

function allEraSelected() {
  var allEras = getVals('era');
  return allEras.every(function(e){return filters.era.includes(e);});
}

function eraQualifies(w, era) {
  var decade = parseInt(era);
  var stints = w.stints || [];
  if (stints.length > 0) {
    return stints.some(function(s){
      if (!s.year_start||!s.year_end) return false;
      var os = Math.max(s.year_start, decade);
      var oe = Math.min(s.year_end, decade+9);
      return oe - os >= 2;
    });
  }
  return (w.era||[]).includes(era);
}

function allPromoSelected() {
  var allIndiv = getVals('promotion_labels');
  var allGroups = getVals('promotion_groups');
  return allIndiv.every(function(p){return filters.promoIndividual.includes(p);}) &&
         allGroups.every(function(g){return filters.promoGroups.includes(g);});
}

function getFilteredPool() {
  var hasIndiv = filters.promoIndividual.length > 0;
  var hasGroup = filters.promoGroups.length > 0;
  var hasEra = filters.era.length > 0;
  var hasPromo = hasIndiv || hasGroup;
  var allPromo = allPromoSelected();

  return allWrestlers.filter(function(w){
    var statusOk = (filters.status.includes('active') && w.active) ||
                   (filters.status.includes('inactive') && !w.active);
    var genderOk = filters.gender.includes(w.gender || 'man');
    var eraOk = !hasEra || allEraSelected() || filters.era.some(function(e){return eraQualifies(w,e);});
    var promoOk = true;
    if (hasPromo) {
      if (allPromo) {
        // all promotions selected — include everyone, even unlabeled
        promoOk = true;
      } else {
        var labels = w.promotion_labels || [];
        var groups = w.promotion_groups || [];
        var indivMatch = hasIndiv && labels.some(function(p){return filters.promoIndividual.includes(p);});
        var groupMatch = hasGroup && groups.some(function(g){return filters.promoGroups.includes(g);});
        promoOk = indivMatch || groupMatch;
      }
    }
    return statusOk && genderOk && eraOk && promoOk;
  });
}

function updatePoolCount() {
  var ct = document.getElementById('pool-ct');
  if (ct) {
    var n = getFilteredPool().length;
    ct.innerHTML = '<strong>' + n + '</strong> wrestlers match your current filters.';
  }
}

/* ── CHIP TOGGLE ────────────────────────────────────────────────────────── */
function toggleChip(el, cat) {
  el.classList.toggle('on');
  updateFilter(cat);
  updatePoolCount();
}

function updateFilter(cat) {
  var idMap = {gender:'f-gender',status:'f-status',era:'f-era',promoIndividual:'f-promo-indiv',promoGroups:'f-promo-groups'};
  var id = idMap[cat];
  if (!id) return;
  filters[cat] = Array.from(document.querySelectorAll('#'+id+' .chip.on')).map(function(c){return c.dataset.v;});
}

function selectSection(cat) {
  var idMap = {gender:'f-gender',status:'f-status',era:'f-era',promoIndividual:'f-promo-indiv',promoGroups:'f-promo-groups'};
  var id = idMap[cat];
  if (!id) return;
  var chips = document.querySelectorAll('#'+id+' .chip');
  var allOn = Array.from(chips).every(function(c){return c.classList.contains('on');});
  chips.forEach(function(c){ allOn ? c.classList.remove('on') : c.classList.add('on'); });
  updateFilter(cat);
  updatePoolCount();
}

function selectAllFilters() {
  document.querySelectorAll('.chip').forEach(function(c){c.classList.add('on');});
  setDefaultFilters();
  updatePoolCount();
}

function deselectAllFilters() {
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  filters = {gender:[],status:[],era:[],promoIndividual:[],promoGroups:[]};
  updatePoolCount();
}

/* ── SESSION ────────────────────────────────────────────────────────────── */
function beginSession() {
  var pool = getFilteredPool();
  if (!pool.length) return false;

  manualOrder = null;
  var maxBatch = computeDefaultBatch(pool.length);
  var WPicker = window.picker.Picker;

  pickerInstance = new WPicker({
    items: pool,
    localStorageKey: 'wr_session',
    getBatchSize: function(n) {
      return Math.max(2, Math.min(maxBatch, Math.ceil(n / 5)));
    }
  });

  showSession();
  render();
  return true;
}

function computeDefaultBatch(n) {
  if (n > 500) return 20;
  if (n > 200) return 15;
  if (n > 100) return 10;
  if (n > 50)  return 7;
  if (n > 20)  return 5;
  return 2;
}

function applyAndStart() {
  var pool = getFilteredPool();
  if (!pool.length) {
    alert('No wrestlers match your current filters. Please adjust them and try again.');
    return;
  }
  showTab('picker');
  beginSession();
}

function showSession() {
  document.getElementById('session-ui').style.display = 'flex';
}

/* ── ACTIONS ────────────────────────────────────────────────────────────── */
var canPick = true;

function doConfirm() {
  if (!pickerInstance || !canPick) return;
  var selected = Array.from(document.querySelectorAll('.card.sel')).map(function(c){return parseInt(c.dataset.id);});
  if (!selected.length) return;
  canPick = false;
  pickerInstance.pick(selected);
  manualOrder = null;
  render();
  canPick = true;
}

/* ── DRAWER (mobile) ────────────────────────────────────────────────────── */
function openDrawer() {
  var col = document.getElementById('found-col');
  var bd  = document.getElementById('drawer-backdrop');

  if (col) col.classList.add('open');
  if (bd)  bd.classList.add('on');

}

  var col = document.getElementById('found-col');
  var bd  = document.getElementById('drawer-backdrop');
  if (col) col.classList.remove('open');
  if (bd)  bd.classList.remove('on');
}

var mq = window.matchMedia('(max-width:640px)');
function onMqChange(e) {
  var btn = document.getElementById('drawer-close');
  if (btn) btn.style.display = e.matches ? '' : 'none';
  if (!e.matches) closeDrawer();
}
mq.addEventListener ? mq.addEventListener('change', onMqChange) : mq.addListener(onMqChange);
function updateRankingsBtn() {
  var btn = document.getElementById('rankings-btn');
  if (!btn) return;
  var n = pickerInstance ? pickerInstance.state.arrays.favorites.length : 0;
  btn.textContent = n > 0 ? 'Rankings (' + n + ')' : 'Rankings';
}

function doPass() {
  if (!pickerInstance) return;
  pickerInstance.pass();
  manualOrder = null;
  render();
}

function doNone() {
  if (!pickerInstance) return;
  pickerInstance.none();
  manualOrder = null;
  render();
}

function doUndo() {
  if (!pickerInstance) return;
  pickerInstance.undo();
  render();
}

function doRedo() {
  if (!pickerInstance) return;
  pickerInstance.redo();
  render();
}

function doReset() { document.getElementById('moverlay').classList.add('on'); }
function closeModal() { document.getElementById('moverlay').classList.remove('on'); }
function confirmReset() {
  closeModal();
  if (pickerInstance) { pickerInstance.reset(); manualOrder = null; render(); }
}

function onBatchChange(val) {
  if (!pickerInstance) return;
  var n = parseInt(val);
  document.getElementById('bval').textContent = n;
  // Put current evaluating batch back into current, then redraw with new size
  var s = pickerInstance.state.arrays;
  Array.prototype.unshift.apply(s.current, s.evaluating);
  s.evaluating = [];
  pickerInstance.state.batchSize = n;
  s.evaluating = s.current.splice(0, Math.min(n, s.current.length));
  pickerInstance.state.batchSize = s.evaluating.length;
  pickerInstance.saveState();
  render();
}

/* ── RENDER ─────────────────────────────────────────────────────────────── */
function render() {
  if (!pickerInstance) return;
  var s = pickerInstance.state.arrays;
  var remaining = s.current.length + s.survived.length + s.evaluating.length;
  var ranked = s.favorites.length;
  var roundTotal = s.current.length + s.evaluating.length + s.survived.length;
  var pct = roundTotal > 0 ? Math.round(s.survived.length / roundTotal * 100) : 0;

  document.getElementById('stat-rem').textContent = remaining;
  document.getElementById('stat-dec').textContent = ranked;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = 'Next ranking';

  var slider = document.getElementById('bslider');
  var bs = pickerInstance.state.batchSize;
  slider.max = Math.min(20, Math.max(2, s.evaluating.length + s.current.length));
  slider.value = bs;
  document.getElementById('bval').textContent = bs;

  document.getElementById('undo-btn').disabled = !pickerInstance.canUndo();
  document.getElementById('redo-btn').disabled = !pickerInstance.canRedo();

  var grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  var batch = pickerInstance.mapItems(s.evaluating);
  var cols = Math.min(5, Math.max(1, batch.length));
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 180px))';
  batch.forEach(function(w) {
    if (!w) return;
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = w.id;
    var name = document.createElement('div');
    name.className = 'cn';
    name.textContent = w.name;
    card.appendChild(name);
    if (w.cagematch_url) {
      var link = document.createElement('a');
      link.className = 'cl';
      link.href = '#';
      link.textContent = '↗\uFE0E Cagematch';
      var openCM = function(url){ return function(e){ e.stopPropagation(); e.preventDefault(); window.open(url,'_blank'); }; }(w.cagematch_url);
      // Desktop: click opens link
      link.addEventListener('click', openCM);
      // Mobile: long-press opens link, short tap does nothing (prevents accidental opens)
      var pressTimer = null;
      link.addEventListener('touchstart', function(e){
        e.stopPropagation();
        pressTimer = setTimeout(function(){ openCM(e); }, 500);
      });
      link.addEventListener('touchend', function(e){
        e.stopPropagation(); e.preventDefault();
        clearTimeout(pressTimer);
      });
      link.addEventListener('touchmove', function(){ clearTimeout(pressTimer); });
      card.appendChild(link);
    }
    card.addEventListener('click', function(){ card.classList.toggle('sel'); updateConfirm(); });

    // Double-click / double-tap: pick only if 0 selected or only this card is selected (CotD behaviour)
    function tryDoublePick() {
      if (!canPick) return;
      var sel = document.querySelectorAll('.card.sel');
      if (sel.length === 0 || (sel.length === 1 && sel[0] === card)) {
        document.querySelectorAll('.card.sel').forEach(function(c){ c.classList.remove('sel'); });
        card.classList.add('sel');
        doConfirm();
      }
    }
    card.addEventListener('dblclick', function(e){ e.preventDefault(); tryDoublePick(); });
    var lastTapTime = 0;
    card.addEventListener('touchend', function(e){
      var now = Date.now();
      if (now - lastTapTime < 300) { e.preventDefault(); tryDoublePick(); }
      lastTapTime = now;
    });

    grid.appendChild(card);
  });
  updateConfirm();
  renderFound();
  updateRankingsBtn();
}

function updateConfirm() {
  var n = document.querySelectorAll('.card.sel').length;
  document.getElementById('sel-ct').textContent = n + ' selected';
  document.getElementById('conf-btn').disabled = n === 0;
}

function renderFound() {
  if (!pickerInstance) return;
  var list = document.getElementById('found-list');
  var favIds = manualOrder || pickerInstance.state.arrays.favorites;
  if (!favIds || !favIds.length) {
    list.innerHTML = '<div class="found-empty">Your ranked wrestlers will appear here as you pick.</div>';
    return;
  }
  list.innerHTML = '';
  favIds.forEach(function(id, i) {
    var w = pickerInstance.itemMap[id];
    if (!w) return;
    var item = document.createElement('div');
    item.className = 'fi';
    item.draggable = true;
    item.dataset.idx = i;
    item.innerHTML =
      '<span class="dh">⠿</span>' +
      '<span class="fr' + (i < 3 ? ' top' : '') + '">#' + (i+1) + '</span>' +
      '<span class="fn">' + w.name + '</span>' +
      (w.cagematch_url ? '<a class="flink" href="#" onclick="event.preventDefault();window.open(\''+w.cagematch_url+'\',\'_blank\')">↗</a>' : '');

    item.addEventListener('dragstart', function(e) {
      dragSrcIdx = i;
      setTimeout(function(){item.classList.add('dragging');}, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', function() {
      item.classList.remove('dragging');
      document.querySelectorAll('.fi').forEach(function(el){el.classList.remove('dover');});
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      document.querySelectorAll('.fi').forEach(function(el){el.classList.remove('dover');});
      item.classList.add('dover');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      if (!manualOrder) manualOrder = pickerInstance.state.arrays.favorites.slice(0);
      var moved = manualOrder.splice(dragSrcIdx, 1)[0];
      manualOrder.splice(i, 0, moved);
      dragSrcIdx = null;
      renderFound();
    });

    list.appendChild(item);
  });
}

/* ── EXPORT ─────────────────────────────────────────────────────────────── */
var exportTab = 'text';

function doExport() {
  exportTab = 'text';
  buildExportContent();
  document.getElementById('export-modal').classList.add('on');
  document.querySelectorAll('.exp-tab-btn').forEach(function(b){ b.classList.toggle('on', b.dataset.tab === 'text'); });
}

function closeExportModal() {
  document.getElementById('export-modal').classList.remove('on');
}

function showExportTab(tab) {
  exportTab = tab;
  document.querySelectorAll('.exp-tab-btn').forEach(function(b){ b.classList.toggle('on', b.dataset.tab === tab); });
  buildExportContent();
  var dlBtn = document.getElementById('exp-dl-btn');
  dlBtn.style.display = (tab === 'url') ? 'none' : '';
  document.getElementById('exp-copy-btn').textContent = (tab === 'url') ? 'Copy URL' : 'Copy';
}

function getExportList() {
  if (!pickerInstance) return [];
  var ids = manualOrder || pickerInstance.state.arrays.favorites;
  return ids.map(function(id){ return pickerInstance.itemMap[id]; }).filter(Boolean);
}

function buildExportContent() {
  var list = getExportList();
  var ta = document.getElementById('exp-ta');
  if (!list.length) { ta.value = '(No wrestlers ranked yet.)'; return; }

  if (exportTab === 'text') {
    ta.value = list.map(function(w, i){ return '#' + (i+1) + ' ' + w.name; }).join('\n');
  } else if (exportTab === 'csv') {
    var rows = [['Rank','Name','Cagematch URL']];
    list.forEach(function(w, i){ rows.push([i+1, w.name, w.cagematch_url || '']); });
    ta.value = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  } else {
    var ids = (manualOrder || pickerInstance.state.arrays.favorites).join(',');
    var url = location.href.split('#')[0] + '#r=' + ids;
    ta.value = url;
  }
}

function exportCopy() {
  var ta = document.getElementById('exp-ta');
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  var btn = document.getElementById('exp-copy-btn');
  var orig = btn.textContent;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = orig; }, 1500);
}

function exportDownload() {
  var list = getExportList();
  if (!list.length) return;
  var content, filename, mime;
  if (exportTab === 'text') {
    content = list.map(function(w, i){ return '#' + (i+1) + ' ' + w.name; }).join('\n');
    filename = 'wrestler-ranking.txt';
    mime = 'text/plain';
  } else {
    var rows = [['Rank','Name','Cagematch URL']];
    list.forEach(function(w, i){ rows.push([i+1, w.name, w.cagematch_url || '']); });
    content = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    filename = 'wrestler-ranking.csv';
    mime = 'text/csv';
  }
  var blob = new Blob([content], {type: mime});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── SHAREABLE URL LOAD ─────────────────────────────────────────────────── */
function loadFromHash() {
  var hash = location.hash;
  if (!hash || hash.indexOf('#r=') !== 0) return false;
  var ids = hash.slice(3).split(',').map(Number).filter(function(n){ return !isNaN(n) && n > 0; });
  if (!ids.length) return false;
  return ids;
}

function applySharedRanking(ids) {
  // Filter to IDs that exist in the loaded data
  var idSet = new Set(allWrestlers.map(function(w){ return w.id; }));
  var valid = ids.filter(function(id){ return idSet.has(id); });
  if (!valid.length) return false;
  manualOrder = valid;
  // Show a notice
  var notice = document.getElementById('shared-notice');
  if (notice) { notice.style.display = ''; }
  return true;
}

/* ── TABS ───────────────────────────────────────────────────────────────── */
function showTab(tab) {
  var isPicker = tab === 'picker';
  var pv = document.getElementById('picker-view');
  var ov = document.getElementById('opts-view');
  if (pv) pv.style.display = isPicker ? 'flex' : 'none';
  if (ov) { ov.style.display = isPicker ? 'none' : 'flex'; ov.classList.toggle('on', !isPicker); }
  document.getElementById('tab-picker').classList.toggle('on', isPicker);
  document.getElementById('tab-opts').classList.toggle('on', !isPicker);
  if (!isPicker) updatePoolCount();
}

loadWrestlers();
</script>
